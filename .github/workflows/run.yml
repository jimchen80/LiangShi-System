name: Liang_6_1_Realtime
on:
  workflow_dispatch:  # 您点一下，它跑一下

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 安装环境
        run: pip install pandas akshare
      - name: 启动引擎
        run: python main.py
      - name: 🚀 导出 6.1 实战报告
        uses: actions/upload-artifact@v4
        with:
          name: 6_1实战分析结果
          path: report.csv
