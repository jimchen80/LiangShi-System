name: LiangShi_6_1_Auto_System
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '45 1 * * 1-5' # 北京时间 09:45
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: 安装必要插件
        run: pip install pandas akshare
      
      - name: 执行选股脚本并发送邮件
        # 这里的 env 部分必须和 main.py 里的 os.getenv 一模一样
        env:
          MY_SENDER: ${{ secrets.MY_SENDER }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
          MY_RECEIVER: ${{ secrets.MY_RECEIVER }}
        run: python main.py
