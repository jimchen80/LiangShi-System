name: LiangShi_Auto_System
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '45 1 * * 1-5'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install pandas akshare
      
      - name: 执行选股分析
        run: python main.py
        
      - name: 🚀 将分析报告打包供下载
        uses: actions/upload-artifact@v4
        with:
          name: 梁氏实战决策报告-${{ github.run_id }}
          path: "*.csv"  # 自动抓取生成的 CSV 文件
