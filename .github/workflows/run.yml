name: LiangShi_6_0_Auto_System
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '45 1 * * 1-5'  # 每天北京时间 09:45 自动运行（UTC时间 01:45）
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install pandas akshare  # 免费自动安装金融插件
      - run: python main.py
        env:
          MY_SENDER: ${{ secrets.MY_SENDER }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
          MY_RECEIVER: ${{ secrets.MY_RECEIVER }}
