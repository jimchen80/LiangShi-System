name: LiangShi_6_0_Auto_System
on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '45 1 * * 1-5' 
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      # --- 关键修复：必须加下面这一行来安装插件 ---
      - run: pip install pandas akshare 
      
      - run: python main.py
        env:
          MY_SENDER: ${{ secrets.MY_SENDER }}
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }}
          MY_RECEIVER: ${{ secrets.MY_RECEIVER }}
